<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать приложение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', 'Impact', sans-serif;
            background: #3b3b3b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: #b8b8b8;
            border-radius: 30px;
            padding: 60px 50px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .header .logo-icon {
            width: 70px;
            height: 70px;
            object-fit: contain;
            display: inline-block;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3));
        }

        h1 {
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #fc4903;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
            margin: 0;
        }

        .subtitle {
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #3b3b3b;
            margin-top: 4px;
            margin-bottom: 45px;
            letter-spacing: 1px;
        }

        .section {
            margin-bottom: 50px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #3b3b3b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .section-title .icon {
            width: 44px;
            height: 44px;
            object-fit: contain;
            display: inline-block;
        }

        .section-desc {
            font-family: 'Arial', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #3b3b3b;
            margin-bottom: 20px;
        }

        .download-btn {
            display: inline-block;
            padding: 20px 55px;
            background: #fc4903;
            color: #fff;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 24px;
            font-weight: 900;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(252, 73, 3, 0.5);
            letter-spacing: 1px;
            border: none;
        }

        .download-btn:hover {
            background: #d63d00;
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(252, 73, 3, 0.7);
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        .qr-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-image {
            width: 220px;
            height: 220px;
            background: #ffffff;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 16px;
            border: 4px solid #3b3b3b;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        .qr-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .qr-label {
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #3b3b3b;
        }

        .qr-label span {
            color: #fc4903;
        }

        @media (max-width: 600px) {
            .container {
                padding: 35px 20px;
            }

            .header {
                gap: 12px;
            }

            .header .logo-icon {
                width: 50px;
                height: 50px;
            }

            h1 {
                font-size: 32px;
            }

            .subtitle {
                font-size: 18px;
                margin-bottom: 35px;
            }

            .section-title {
                font-size: 22px;
                flex-wrap: wrap;
            }

            .section-title .icon {
                width: 36px;
                height: 36px;
            }

            .download-btn {
                padding: 16px 30px;
                font-size: 20px;
                width: 100%;
            }

            .qr-image {
                width: 170px;
                height: 170px;
            }

            .qr-label {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <img src="chainsaw-icon.ico" alt="Бензопила" class="logo-icon" />
            <h1>СКАЧАЙТЕ</h1>
        </div>
        <p class="subtitle">Наше приложение БЕНZОПИЛЫ</p>

        <div class="section">
            <div class="section-title">
                <img src="pc-icon.png" alt="ПК" class="icon" />
                Для компьютера
            </div>
            <p class="section-desc">Установочный файл для Windows</p>
            <a href="https://drive.google.com/uc?export=download&id=1SOTuzVqSSnjQQ4HMQtT4Qc-n8cYT9X32" class="download-btn">⬇ СКАЧАТЬ</a>
        </div>

        <div class="section">
            <div class="section-title">
                <img src="mob-icon.png" alt="Телефон" class="icon" />
                Для телефона
            </div>
            <p class="section-desc">Наведите камеру на QR-код</p>

            <div class="qr-wrapper">
                <div class="qr-image">
                    <img src="qr-code.png" alt="QR-код для скачивания" />
                </div>
                <div class="qr-label">
                    <span>⬇</span> Сканируйте и устанавливайте
                </div>
            </div>
        </div>

    </div>

</body>
</html>
